<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Tohoku Roboconist Union（TRU）の公式サイト">
<title>Admin – TRU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body data-page="admin">
<div data-site-header></div>
<main id="admin-page"><div id="adm-login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo"><img src="assets/images/403d98c0ffa4.png" alt="TRU"></div>
      <p class="login-title">管理者ログイン</p><p class="login-sub">TRU 管理画面</p>
      <div class="login-form">
        <div id="lerr" class="login-err">ユーザー名またはパスワードが正しくありません。</div>
        <div class="fg"><label class="fl">ユーザー名</label><input class="fi" type="text" id="lu" placeholder="admin"></div>
        <div class="fg"><label class="fl">パスワード</label><input class="fi" type="password" id="lp" placeholder="••••••••"></div>
        <button class="btn-sub" data-login class="login-submit">ログイン</button>
        <p class="login-demo">デモ: admin / tru2025</p>
      </div>
    </div>
  </div>
</div>
<div id="adm-dash" class="is-hidden">
  <div class="adm-layout">
    <div class="adm-sb">
      <p class="adm-sb-title">管理メニュー</p>
      <div class="adm-nav">
        <div class="an active" data-admin-panel="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>ダッシュボード</div>
        <div class="an" data-admin-panel="posts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>記事一覧</div>
        <div class="an" data-admin-panel="new-post"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新規投稿</div>
        <div class="an admin-nav-bottom" data-route="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>サイトを表示</div>
        <div class="an admin-nav-logout" data-logout><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>ログアウト</div>
      </div>
    </div>
    <div class="adm-main">
      <div class="adm-panel active" id="panel-dashboard">
        <div class="adm-hdr"><div><p class="adm-title">ダッシュボード</p><p class="adm-sub">TRU 管理画面へようこそ</p></div></div>
        <div class="adm-stats" id="adm-stats"></div>
        <p class="admin-recent-label">最近の記事</p>
        <div class="aplist" id="dash-recent"></div>
      </div>
      <div class="adm-panel" id="panel-posts">
        <div class="adm-hdr"><div><p class="adm-title">記事一覧</p><p class="adm-sub" id="posts-cnt"></p></div>
          <button class="bsm primary" data-admin-panel="new-post">＋ 新規投稿</button></div>
        <div class="aplist" id="adm-post-list"></div>
      </div>
      <div class="adm-panel" id="panel-new-post">
        <div class="adm-hdr"><div><p class="adm-title" id="ed-label">新規投稿</p><p class="adm-sub">記事を作成して公開しましょう</p></div></div>
        <input type="hidden" id="ed-id">
        <div class="ef">
          <div><label class="ef-lbl">記事タイトル *</label><input class="ef-i" id="pt" type="text" placeholder="記事のタイトルを入力"></div>
          <div class="ef-row">
            <div><label class="ef-lbl">カテゴリ</label><select class="ef-sel" id="pc"><option value="活動報告">活動報告</option><option value="大会レポート">大会レポート</option><option value="技術紹介">技術紹介</option><option value="お知らせ">お知らせ</option></select></div>
            <div><label class="ef-lbl">著者名</label><input class="ef-i" id="pa" type="text" placeholder="例）相原 仁"></div>
          </div>
          <div><label class="ef-lbl">本文 *（## 見出し、**太字** 対応）</label><textarea class="ef-ta" id="pb" placeholder="記事の内容を入力してください。&#10;## 見出し&#10;本文テキスト..."></textarea></div>
          <div><label class="ef-lbl">公開ステータス</label><select class="ef-sel" id="ps"><option value="published">公開</option><option value="draft">下書き</option></select></div>
          <div class="ea"><button class="blg green" data-save-post>保存・公開</button><button class="blg gray" data-reset-editor>リセット</button></div>
        </div>
      </div>
    </div>
  </div>
</div></main>
<div data-site-footer></div>

<script src="scripts/app.js" defer></script>
</body>
</html>
