<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Tohoku Roboconist Union（TRU）の公式サイト">
<title>Gallery – TRU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body data-page="gallery">
<div data-site-header></div>
<main id="gallery-page"><div class="page-hero">
  <img src="assets/images/a77cc7d9c4c0.jpg" alt="活動写真" class="ph-bg">
  <div class="ph-ov"></div>
  <div class="ph-body"><p class="ph-tag">Gallery</p><h1 class="ph-title">活動写真</h1></div>
</div>
<section class="section alt">
<div class="sn">
  <div class="reveal"><p class="stag">Photos</p><h2 class="stitle">大会・活動の様子</h2></div>
  <div class="gal-grid reveal">
    <div class="gi" data-lightbox="0"><img src="assets/images/a066913fd2b9.jpg" alt="チーム集合"></div>
    <div class="gi" data-lightbox="1"><img src="assets/images/85cb70232a23.jpg" alt="ロボットアーム"></div>
    <div class="gi" data-lightbox="2"><img src="assets/images/17f1a35301c5.jpg" alt="ロボット全景"></div>
    <div class="gi" data-lightbox="3"><img src="assets/images/d6ed05dce717.jpg" alt="ピット作業1"></div>
    <div class="gi" data-lightbox="4"><img src="assets/images/813056169cb5.jpg" alt="ピット作業2"></div>
    <div class="gi" data-lightbox="5"><img src="assets/images/d698ab9c58c2.jpg" alt="グリーンLEDロボット"></div>
    <div class="gi" data-lightbox="6"><img src="assets/images/35601774a3a8.jpg" alt="レッドライトロボット"></div>
    <div class="gi" data-lightbox="7"><img src="assets/images/f9e481cfd016.jpg" alt="大会シーン"></div>
    <div class="gi" data-lightbox="8"><img src="assets/images/53962bec2e8f.jpg" alt="オペレーター"></div>
    <div class="gi" data-lightbox="9"><img src="assets/images/75904c4b1646.jpg" alt="フィールド走行"></div>
  </div>
</div>
</section></main>
<div data-site-footer></div>
<div class="lightbox" id="lb" role="dialog" aria-modal="true" aria-label="画像ライトボックス" data-lightbox-overlay>
  <button class="lb-close" type="button" data-lightbox-close aria-label="閉じる">×</button>
  <button class="lb-arrow lb-prev" type="button" data-lightbox-nav="-1" aria-label="前の画像">‹</button>
  <img id="lb-img" src="assets/images/a066913fd2b9.jpg" alt="拡大表示中の活動写真">
  <button class="lb-arrow lb-next" type="button" data-lightbox-nav="1" aria-label="次の画像">›</button>
</div>
<script src="scripts/app.js" defer></script>
</body>
</html>
